name: Deploy to Aliyun (SCP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aliyun-deploy-main
  cancel-in-progress: false

env:
  DEPLOY_PATH: /www/wwwroot/student-correction-feedback
  PM2_NAME: student-correction-feedback
  APP_PORT: "3002"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Tar and SCP
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' -czf /tmp/deploy.tar.gz .
          scp -P "$SSH_PORT" /tmp/deploy.tar.gz "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/deploy.tar.gz"

      - name: Build and restart
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          set -e
          PM2="student-correction-feedback"
          PORT="3002"
          APP_ROOT="/www/wwwroot"
          DEPLOY="$APP_ROOT/$PM2"

          cd "$DEPLOY"
          rm -rf .next

          tar -xzf /tmp/deploy.tar.gz
          rm /tmp/deploy.tar.gz

          if [ ! -f .env ]; then
            printf '%s\n' \
              'DEEPSEEK_API_KEY=sk-97020bc355174f6caaf3bf4d11619ada' \
              'DEEPSEEK_BASE_URL=https://api.deepseek.com' \
              'DEEPSEEK_MODEL=deepseek-v4-pro' \
              'TEACHER_PAGE_PASSWORD=dada123' > .env
          fi

          npm ci
          npx playwright install-deps chromium 2>/dev/null || true
          npx playwright install chromium
          npm run build

          if pm2 describe "$PM2" >/dev/null 2>&1; then
            pm2 restart "$PM2" --update-env
          else
            pm2 start npm --name "$PM2" -- run start -- --port "$PORT"
          fi
          pm2 save

          sleep 5
          echo "=== pm2 status ==="
          pm2 list
          echo "=== health check ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "http://127.0.0.1:$PORT/" || true
          echo ""
          echo "=== pm2 logs (last 15 lines) ==="
          pm2 logs "$PM2" --lines 15 --nostream 2>/dev/null || true

          echo "=== sync nginx site configs ==="
          NGINX_DIR="/www/server/panel/vhost/nginx"
          for SITE in we-teach.cn toolou.cn; do
            CONF=$(find "$NGINX_DIR" -maxdepth 1 -type f -name "$SITE.conf" -print -quit 2>/dev/null || true)
            if [ -z "$CONF" ]; then
              echo "[warn] nginx conf not found for $SITE"
              continue
            fi
            if grep -q "proxy_pass" "$CONF"; then
              sed -i -E 's#proxy_pass http://127\.0\.0\.1:[0-9]+;#proxy_pass http://127.0.0.1:3002;#g' "$CONF"
            fi
            if grep -q "proxy_read_timeout" "$CONF"; then
              sed -i -E 's/proxy_read_timeout [0-9]+s;/proxy_read_timeout 180s;/g' "$CONF"
            fi
          done

          echo "=== clear nginx cache ==="
          find /www/server/nginx/proxy_cache_dir -type f -delete 2>/dev/null || true
          nginx -t
          nginx -s reload

          echo "[deploy] done, port=$PORT"
          '
