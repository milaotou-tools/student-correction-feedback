name: Deploy to Aliyun (SCP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aliyun-deploy-main
  cancel-in-progress: false

env:
  DEPLOY_PATH: /www/wwwroot/student-correction-feedback
  PM2_NAME: student-correction-feedback
  APP_PORT: "3002"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Build standalone bundle
        run: |
          npm ci
          npm run build
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          cp expert-methodology.md .next/standalone/expert-methodology.md
          tar -czf /tmp/deploy.tar.gz -C .next/standalone .

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Tar and SCP
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          scp -P "$SSH_PORT" /tmp/deploy.tar.gz "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/deploy.tar.gz"

      - name: Build and restart
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TEACHER_PASSWORD: ${{ secrets.TEACHER_PAGE_PASSWORD }}
        run: |
          DEEPSEEK_KEY_B64="$(printf '%s' "$DEEPSEEK_KEY" | base64 -w 0)"
          TEACHER_PASSWORD_B64="$(printf '%s' "$TEACHER_PASSWORD" | base64 -w 0)"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" "DEEPSEEK_KEY_B64='$DEEPSEEK_KEY_B64' TEACHER_PASSWORD_B64='$TEACHER_PASSWORD_B64' bash -s" <<'REMOTE'
          set -e
          PM2="student-correction-feedback"
          PORT="3002"
          APP_ROOT="/www/wwwroot"
          DEPLOY="$APP_ROOT/$PM2"
          DEEPSEEK_KEY="$(printf '%s' "$DEEPSEEK_KEY_B64" | base64 -d)"
          TEACHER_PASSWORD="$(printf '%s' "$TEACHER_PASSWORD_B64" | base64 -d)"

          cd "$DEPLOY"

          tar -xzf /tmp/deploy.tar.gz
          echo "Standalone bundle extracted."

          if [ ! -f .env ]; then
            touch .env
          fi

          if [ -n "$DEEPSEEK_KEY" ]; then
            if grep -q "^DEEPSEEK_API_KEY=" .env; then
              sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=$DEEPSEEK_KEY|" .env
            else
              echo "DEEPSEEK_API_KEY=$DEEPSEEK_KEY" >> .env
            fi
          fi
          if ! grep -q "^DEEPSEEK_BASE_URL=" .env; then
            echo 'DEEPSEEK_BASE_URL=https://api.deepseek.com' >> .env
          fi
          if ! grep -q "^DEEPSEEK_MODEL=" .env; then
            echo 'DEEPSEEK_MODEL=deepseek-v4-pro' >> .env
          fi
          if [ -n "$TEACHER_PASSWORD" ]; then
            if grep -q "^TEACHER_PAGE_PASSWORD=" .env; then
              sed -i "s|^TEACHER_PAGE_PASSWORD=.*|TEACHER_PAGE_PASSWORD=$TEACHER_PASSWORD|" .env
            else
              echo "TEACHER_PAGE_PASSWORD=$TEACHER_PASSWORD" >> .env
            fi
          fi

          if pm2 describe "$PM2" >/dev/null 2>&1; then
            pm2 delete "$PM2"
          fi
          fuser -k "$PORT"/tcp 2>/dev/null || true
          fuser -k -6 "$PORT"/tcp 2>/dev/null || true
          PORT="$PORT" HOSTNAME="127.0.0.1" pm2 start server.js --name "$PM2" --update-env
          pm2 save

          sleep 5
          echo "=== pm2 status ==="
          pm2 list
          echo "=== health check ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "http://127.0.0.1:$PORT/" || true
          echo ""
          echo "=== pm2 logs (last 15 lines) ==="
          pm2 logs "$PM2" --lines 15 --nostream 2>/dev/null || true

          echo "=== ensure title clinic API timeout ==="
          NGINX_CONF="/www/server/panel/vhost/nginx/feedback.we-teach.cn.conf"
          if [ -f "$NGINX_CONF" ] && ! grep -q "title-clinic-api-long-timeout" "$NGINX_CONF"; then
            cp "$NGINX_CONF" "$NGINX_CONF.bak.$(date +%Y%m%d%H%M%S)"
            python3 - "$NGINX_CONF" <<'PY'
          import sys
          from pathlib import Path
          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")
          block = """
              # title-clinic-api-long-timeout
              location ^~ /api/title-clinic/ {
                  proxy_pass http://127.0.0.1:3002;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 30s;
                  proxy_send_timeout 300s;
                  proxy_read_timeout 300s;
              }
          
          """
          insert_at = text.rfind("\n}")
          if insert_at < 0:
              raise SystemExit("could not find server block end")
          path.write_text(text[:insert_at] + "\n" + block + text[insert_at:], encoding="utf-8")
          PY
          fi

          echo "=== clear nginx cache ==="
          echo "Skip batch cache deletion; reload nginx only."
          nginx -t
          nginx -s reload

          echo "[deploy] done, port=$PORT"
          REMOTE

