name: Deploy to Aliyun (SCP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aliyun-deploy-main
  cancel-in-progress: false

env:
  DEPLOY_PATH: /www/wwwroot/student-correction-feedback
  PM2_NAME: student-correction-feedback
  APP_PORT: "3002"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Tar and SCP
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' -czf /tmp/deploy.tar.gz .
          scp -P "$SSH_PORT" /tmp/deploy.tar.gz "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/deploy.tar.gz"

      - name: Build and restart
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TEACHER_PASSWORD: ${{ secrets.TEACHER_PAGE_PASSWORD }}
        run: |
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          set -e
          PM2="student-correction-feedback"
          PORT="3002"
          APP_ROOT="/www/wwwroot"
          DEPLOY="$APP_ROOT/$PM2"

          cd "$DEPLOY"
          echo "Skip deleting .next; next build will refresh build output."

          tar -xzf /tmp/deploy.tar.gz
          echo "Deploy archive extracted."

          if [ ! -f .env ]; then
            echo "DEEPSEEK_API_KEY='"$DEEPSEEK_KEY"'" > .env
            echo 'DEEPSEEK_BASE_URL=https://api.deepseek.com' >> .env
            echo 'DEEPSEEK_MODEL=deepseek-v4-pro' >> .env
            echo "TEACHER_PAGE_PASSWORD='"$TEACHER_PASSWORD"'" >> .env
          fi

          if [ -x node_modules/.bin/next ]; then
            echo "node_modules and next exist; skip dependency install."
          else
            echo "Dependencies are missing; prepare deploy swap and install."
            if ! swapon --show | grep -q "/swapfile-deploy"; then
              if [ ! -f /swapfile-deploy ]; then
                fallocate -l 1G /swapfile-deploy || dd if=/dev/zero of=/swapfile-deploy bs=64M count=16
                chmod 600 /swapfile-deploy
                mkswap /swapfile-deploy
              fi
              swapon /swapfile-deploy || true
            fi
            npm install --no-save --no-package-lock --no-audit --no-fund --prefer-offline --ignore-scripts next@15.5.18 typescript@5.8.3
          fi
          npm run build

          if pm2 describe "$PM2" >/dev/null 2>&1; then
            pm2 restart "$PM2" --update-env
          else
            pm2 start npm --name "$PM2" -- run start -- --port "$PORT"
          fi
          pm2 save

          sleep 5
          echo "=== pm2 status ==="
          pm2 list
          echo "=== health check ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "http://127.0.0.1:$PORT/" || true
          echo ""
          echo "=== pm2 logs (last 15 lines) ==="
          pm2 logs "$PM2" --lines 15 --nostream 2>/dev/null || true

          echo "=== clear nginx cache ==="
          echo "Skip batch cache deletion; reload nginx only."
          nginx -s reload

          echo "[deploy] done, port=$PORT"
          '
