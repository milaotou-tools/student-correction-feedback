name: Deploy to Aliyun (SCP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aliyun-deploy-main
  cancel-in-progress: false

env:
  DEPLOY_PATH: /www/wwwroot/student-correction-feedback
  PM2_NAME: student-correction-feedback
  APP_PORT: "3007"
  EXTERNAL_PORT: "3002"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Tar and SCP
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' -czf /tmp/deploy.tar.gz .
          scp -P "$SSH_PORT" /tmp/deploy.tar.gz "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/deploy.tar.gz"

      - name: Build and restart
        env:
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          set -e
          PM2="student-correction-feedback"
          PORT="3007"
          DEPLOY="/www/wwwroot/student-correction-feedback"

          # stop pm2 + clean saved state
          pm2 delete "$PM2" 2>/dev/null || true
          pm2 save --force
          # clear any saved PM2 state that might resurrect old processes
          rm -f /root/.pm2/dump.pm2 2>/dev/null || true
          sleep 2
          # kill everything on the port
          fuser -k "$PORT/tcp" 2>/dev/null || true
          sleep 1
          fuser -k -6 "$PORT/tcp" 2>/dev/null || true
          sleep 1
          lsof -ti:"$PORT" 2>/dev/null | xargs -r kill -9 2>/dev/null || true
          sleep 2
          # verify port is truly free
          if ss -tlnp 2>/dev/null | grep -q ":$PORT "; then
            echo "WARNING: port $PORT still in use"
            ss -tlnp | grep ":$PORT "
            fuser -k -9 "$PORT/tcp" 2>/dev/null || true
            sleep 3
          fi

          # clean old build
          cd "$DEPLOY"
          rm -rf .next

          # extract source
          tar -xzf /tmp/deploy.tar.gz
          rm /tmp/deploy.tar.gz

          # create .env if missing (DeepSeek keys from proposal-helper)
          if [ ! -f .env ]; then
            cat > .env << '"'"'ENVEOF'"'"'
          DEEPSEEK_API_KEY=sk-97020bc355174f6caaf3bf4d11619ada
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          DEEPSEEK_MODEL=deepseek-v4-pro
          TEACHER_PAGE_PASSWORD=dada123
          ENVEOF
          fi

          # install + build
          npm ci

          # install Playwright Chromium for report image generation
          npx playwright install-deps chromium 2>/dev/null || true
          npx playwright install chromium

          npm run build

          # start
          pm2 start npx --name "$PM2" -- next start -p "$PORT"
          pm2 save

          # wait for next.js to be ready
          sleep 5
          echo "=== pm2 status ==="
          pm2 list
          echo "=== health check ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "http://127.0.0.1:$PORT/student-correction-feedback" || true
          echo ""
          echo "=== pm2 logs (last 15 lines) ==="
          pm2 logs "$PM2" --lines 15 --nostream 2>/dev/null || true

          # fix nginx proxy_pass for OUR ports (3002 / 80 → 3007)
          # but do NOT change port 8083 (proposal-helper → 3005)
          echo "=== fixing nginx proxy_pass for student-correction-feedback ==="
          # search all files (some BT Panel proxy configs don't have .conf extension)
          find /www/server/panel/vhost/nginx -type f 2>/dev/null | while read f; do
            if grep -q "proxy_pass.*127.0.0.1" "$f" 2>/dev/null; then
              # skip proposal-helper configs (port 8083)
              if grep -q "8083" "$f" 2>/dev/null; then
                echo "skipping $f (contains 8083)"
              else
                echo "fixing $f"
                sed -i "s|proxy_pass http://127.0.0.1:[0-9]\+;|proxy_pass http://127.0.0.1:3007;|g" "$f"
              fi
            fi
          done
          # ensure proposal-helper proxy on 8083 → 3005
          echo "=== fixing proposal-helper proxy (8083 → 3005) ==="
          grep -rl "8083" /www/server/panel/vhost/nginx/ 2>/dev/null | while read f; do
            if grep -q "proxy_pass" "$f" 2>/dev/null; then
              echo "fixing $f"
              sed -i "s|proxy_pass http://127.0.0.1:[0-9]\+;|proxy_pass http://127.0.0.1:3005;|g" "$f"
            fi
          done

          # ensure proposal-helper is running on port 3005 (if deployed)
          if [ -d /www/wwwroot/proposal-helper ] && [ -f /www/wwwroot/proposal-helper/package.json ]; then
            echo "=== restarting proposal-helper ==="
            cd /www/wwwroot/proposal-helper
            pm2 delete proposal-helper 2>/dev/null || true
            sleep 1
            fuser -k 3005/tcp 2>/dev/null || true
            sleep 1
            pm2 start npx --name proposal-helper -- next start -p 3005
            pm2 save
            cd "$DEPLOY"
          else
            echo "proposal-helper not deployed on this server, skipping"
          fi

          # clear nginx cache
          find /www/server/nginx/proxy_cache_dir -type f -delete 2>/dev/null || true
          nginx -s reload

          echo "[deploy] done, port=$PORT"
          '
